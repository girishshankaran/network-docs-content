name: Validate Content

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v5
        with:
          path: network-docs-content

      - name: Checkout releases repo
        uses: actions/checkout@v5
        with:
          repository: girishshankaran/network-docs-releases
          ref: main
          path: network-docs-releases

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Assign missing topic IDs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node network-docs-content/scripts/assign-missing-topic-ids.js

      - name: Commit assigned topic IDs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd network-docs-content
          if git diff --quiet; then
            echo "No topic_id updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics
          git commit -m "Assign missing topic IDs"
          git push

      - name: Validate canonical content
        run: node network-docs-content/scripts/validate-content.js

      - name: Check release packaging suggestions
        run: node network-docs-releases/scripts/suggest-release-updates.js network-docs-content network-docs-releases

  trigger-releases-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release site rebuild
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TRIGGER_TOKEN }}
        run: |
          gh api \
            repos/girishshankaran/network-docs-releases/actions/workflows/releases-pages.yml/dispatches \
            -X POST \
            -f ref=main
