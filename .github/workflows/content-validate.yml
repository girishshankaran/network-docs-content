name: Validate Content

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v5
        with:
          path: network-docs-content

      - name: Checkout releases repo
        uses: actions/checkout@v5
        with:
          repository: girishshankaran/network-docs-releases
          ref: main
          path: network-docs-releases

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate canonical content
        run: node network-docs-content/scripts/validate-content.js

      - name: Validate release packaging
        run: node network-docs-releases/scripts/validate-release-assets.js network-docs-content network-docs-releases

      - name: Check release packaging suggestions
        run: node network-docs-releases/scripts/suggest-release-updates.js network-docs-content network-docs-releases

  trigger-releases-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release site rebuild
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TRIGGER_TOKEN }}
        run: |
          gh api \
            repos/girishshankaran/network-docs-releases/actions/workflows/releases-pages.yml/dispatches \
            -X POST \
            -f ref=main
